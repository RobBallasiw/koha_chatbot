<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Chat — Lorma Library</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; color: #333; line-height: 1.5; height: 100vh; display: flex; flex-direction: column; }
    header { background: #2c3e50; color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1rem; font-weight: 600; }
    .status-text { font-size: 0.8rem; color: #a0d2db; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
    .msg { margin-bottom: 12px; max-width: 80%; }
    .msg-user { margin-left: auto; }
    .msg-user .bubble { background: #3498db; color: #fff; border-radius: 14px 14px 0 14px; padding: 10px 14px; }
    .msg-librarian { margin-right: auto; }
    .msg-librarian .bubble { background: #2c3e50; color: #fff; border-radius: 14px 14px 14px 0; padding: 10px 14px; }
    .msg-assistant .bubble { background: #ecf0f1; color: #333; border-radius: 14px; padding: 10px 14px; }
    .msg-label { font-size: 0.7rem; color: #999; margin-bottom: 2px; }
    .msg-user .msg-label { text-align: right; }
    .input-bar { display: flex; gap: 8px; padding: 12px 16px; background: #fff; border-top: 1px solid #ecf0f1; }
    .input-bar input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
    .input-bar input:focus { border-color: #2c3e50; outline: none; }
    .input-bar button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    #send-btn { background: #2c3e50; color: #fff; }
    #end-btn { background: #e74c3c; color: #fff; font-size: 0.78rem; padding: 8px 12px; }
    .empty { text-align: center; color: #7f8c8d; padding: 40px 20px; font-size: 0.9rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <h1>📚 Live Chat</h1>
    <span id="status" class="status-text">Connecting…</span>
  </header>
  <div class="chat-messages" id="messages"><div class="empty">Connecting…</div></div>
  <div class="input-bar" id="input-bar">
    <input type="text" id="reply" placeholder="Type your reply…" aria-label="Reply">
    <button id="send-btn" type="button">Send</button>
    <button id="end-btn" type="button">End</button>
  </div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var apiKey = params.get("key") || "";
  var sessionId = params.get("session") || "";
  var myName = decodeURIComponent(params.get("name") || "Librarian");

  var statusEl = document.getElementById("status");
  var messagesEl = document.getElementById("messages");
  var replyInput = document.getElementById("reply");
  var sendBtn = document.getElementById("send-btn");
  var endBtn = document.getElementById("end-btn");
  var inputBar = document.getElementById("input-bar");

  var liveChatId = "";
  var pollTimer = null;

  if (!apiKey) {
    statusEl.textContent = "Missing API key";
    messagesEl.innerHTML = '<div class="empty">Invalid link — no API key provided.</div>';
    inputBar.style.display = "none";
    return;
  }

  init();

  async function init() {
    if (sessionId) {
      await joinBySession();
    } else {
      await findWaiting();
    }
  }

  async function findWaiting() {
    try {
      var resp = await fetch("/admin/api/handoff-sessions?page_size=50", { headers: { "X-Admin-Key": apiKey } });
      if (resp.status === 401) { showError("Invalid API key"); return; }
      var data = await resp.json();
      var sessions = data.sessions || [];
      var waiting = sessions.filter(function(s) { return !s.staff_username; });
      if (waiting.length > 0) {
        sessionId = waiting[0].session_id;
        liveChatId = waiting[0].live_chat_id;
        await claimAndStart();
      } else if (sessions.length > 0) {
        sessionId = sessions[0].session_id;
        liveChatId = sessions[0].live_chat_id;
        await claimAndStart();
      } else {
        statusEl.textContent = "Waiting for patrons…";
        messagesEl.innerHTML = '<div class="empty">No patrons waiting right now. This page will update automatically.</div>';
        pollTimer = setInterval(async function() {
          try {
            var r = await fetch("/admin/api/handoff-sessions?page_size=1", { headers: { "X-Admin-Key": apiKey } });
            var d = await r.json();
            if (d.sessions && d.sessions.length > 0) {
              clearInterval(pollTimer);
              sessionId = d.sessions[0].session_id;
              liveChatId = d.sessions[0].live_chat_id;
              await claimAndStart();
            }
          } catch(e) {}
        }, 4000);
      }
    } catch(e) { showError("Network error"); }
  }

  async function joinBySession() {
    try {
      var resp = await fetch("/admin/api/handoff-sessions?page_size=50", { headers: { "X-Admin-Key": apiKey } });
      if (resp.status === 401) { showError("Invalid API key"); return; }
      var data = await resp.json();
      var match = (data.sessions || []).find(function(s) { return s.session_id === sessionId; });
      if (match) {
        liveChatId = match.live_chat_id;
        await claimAndStart();
      } else {
        statusEl.textContent = "Session ended";
        messagesEl.innerHTML = '<div class="empty">This session has already ended or been handled.</div>';
        inputBar.style.display = "none";
      }
    } catch(e) { showError("Network error"); }
  }

  async function claimAndStart() {
    try {
      var resp = await fetch("/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/claim", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Admin-Key": apiKey },
        body: JSON.stringify({ username: myName })
      });
      if (resp.status === 409) {
        var d = await resp.json();
        statusEl.textContent = "Handled by " + (d.claimed_by || "someone");
        inputBar.style.display = "none";
      } else {
        statusEl.textContent = "Chatting as " + myName;
      }
    } catch(e) {
      statusEl.textContent = "Connected";
    }
    await loadMessages();
    startPoll();
    replyInput.focus();
  }

  async function loadMessages() {
    if (!liveChatId) return;
    try {
      var resp = await fetch("/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/messages", {
        headers: { "X-Admin-Key": apiKey }
      });
      var data = await resp.json();
      render(data.messages || []);
      if (data.status === "ended") {
        statusEl.textContent = "Chat ended";
        inputBar.style.display = "none";
        stopPoll();
      }
    } catch(e) {}
  }

  function render(msgs) {
    messagesEl.innerHTML = "";
    if (!msgs.length) { messagesEl.innerHTML = '<div class="empty">Waiting for patron…</div>'; return; }
    msgs.forEach(function(m) {
      var div = document.createElement("div");
      var cls = "msg ", label = "";
      if (m.role === "user") { cls += "msg-user"; label = "👤 Patron"; }
      else if (m.role === "librarian") { cls += "msg-librarian"; label = "👩‍💼 " + myName; }
      else { cls += "msg-assistant"; label = "🤖 Hero"; }
      var t = m.timestamp ? new Date(m.timestamp * 1000).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "";
      div.className = cls;
      div.innerHTML = '<div class="msg-label">' + label + " · " + t + '</div><div class="bubble">' + esc(m.content) + '</div>';
      messagesEl.appendChild(div);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML.replace(/\n/g, "<br>"); }
  function startPoll() { stopPoll(); pollTimer = setInterval(loadMessages, 3000); }
  function stopPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
  function showError(msg) { statusEl.textContent = msg; messagesEl.innerHTML = '<div class="empty">' + msg + '</div>'; inputBar.style.display = "none"; }

  sendBtn.addEventListener("click", doSend);
  replyInput.addEventListener("keydown", function(e) { if (e.key === "Enter") { e.preventDefault(); doSend(); } });

  async function doSend() {
    var text = replyInput.value.trim();
    if (!text || !liveChatId) return;
    replyInput.value = "";
    try {
      await fetch("/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/reply", {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Admin-Key": apiKey },
        body: JSON.stringify({ message: text, sender_name: myName })
      });
      await loadMessages();
    } catch(e) {}
    replyInput.focus();
  }

  endBtn.addEventListener("click", async function() {
    if (!liveChatId || !confirm("End this chat?")) return;
    try {
      await fetch("/admin/api/live-chat/" + encodeURIComponent(liveChatId) + "/end", {
        method: "POST", headers: { "X-Admin-Key": apiKey }
      });
      statusEl.textContent = "Chat ended";
      inputBar.style.display = "none";
      stopPoll();
    } catch(e) {}
  });
})();
</script>
</body>
</html>
