# Reverse proxy for the Library AI Chatbot
# Add this inside the OPAC <VirtualHost *:80> block in your Koha Apache config,
# or include it via: Include /path/to/chatbot-proxy.conf
#
# This makes the chatbot accessible at http://localhost/chatbot/
# so it shares the same origin as the Koha OPAC (no iframe cross-origin issues).

ProxyPreserveHost On
ProxyPass /chatbot/ http://127.0.0.1:8000/
ProxyPassReverse /chatbot/ http://127.0.0.1:8000/
